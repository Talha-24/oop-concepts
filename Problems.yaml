# PROBLEM
 public static double getMean(double[] values){
        double avg=0D;
        double sum=0;;
        for(int i=0; i<values.length ; i++)
        {
          sum+=values[i];
        }
        avg=sum/values.length;
        return avg;
    }
    
    public static void getResults(String name,double[] numbers){
        
        System.out.println(name + " " +  getMean(numbers));
    }
    
    
    public static void main(String[] args) {
        
        
        String name="Mohammad Talha";
        double[] nums={-55.2,424.2,323424,87,29};
        getResults(name,nums);
        
      
    }